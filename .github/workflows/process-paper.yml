name: Process Paper from Inbox

on:
  push:
    branches: [main]
    paths:
      - 'inbox/papers/**'

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Install pdf-parse for PDF text extraction
      - run: npm install --no-save pdf-parse

      - name: Find new PDFs in inbox
        id: find
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'inbox/papers/*.pdf' | head -5)
          echo "files=$NEW_FILES" >> $GITHUB_OUTPUT
          echo "Found: $NEW_FILES"

      - name: Process each PDF with Claude AI
        if: steps.find.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for file in ${{ steps.find.outputs.files }}; do
            echo "Processing $file..."
            node scripts/process-paper.mjs "$file"
          done

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/papers/ public/papers/
          git diff --staged --quiet || git commit -m "auto: process paper from inbox"
          git push
