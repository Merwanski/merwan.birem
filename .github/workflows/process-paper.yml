name: Process Paper from Inbox

on:
  push:
    branches: [main]
    paths:
      - 'inbox/papers/**'

permissions:
  contents: write
  actions: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Install pdf-parse for PDF text extraction
      - run: npm install --no-save pdf-parse

      - name: Find new PDFs in inbox
        id: find
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'inbox/papers/*.pdf' | head -5)
          echo "files=$NEW_FILES" >> $GITHUB_OUTPUT
          echo "Found: $NEW_FILES"

      - name: Process each PDF with Claude AI
        if: steps.find.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for file in ${{ steps.find.outputs.files }}; do
            echo "Processing $file..."
            node scripts/process-paper.mjs "$file"
          done

      - name: Commit generated content
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/papers/ public/papers/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Nothing changed."
          else
            git commit -m "auto: process paper from inbox"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}'
